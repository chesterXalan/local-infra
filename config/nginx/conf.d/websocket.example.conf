# WebSocket 反向代理
server {
    listen 443 ssl;
    http2 on;
    server_name ws.DOMAIN;

    include /etc/nginx/snippets/ssl.conf;

    location / {
        proxy_pass http://host.docker.internal:8081;
        include /etc/nginx/snippets/proxy-headers.conf;
        include /etc/nginx/snippets/ws-upgrade.conf;
    }
}
