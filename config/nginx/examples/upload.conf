# 大檔上傳反向代理（MinIO / S3）
server {
    listen 443 ssl;
    http2 on;
    server_name s3.DOMAIN;

    include /etc/nginx/snippets/ssl.conf;

    location / {
        proxy_pass http://host.docker.internal:9000;
        include /etc/nginx/snippets/proxy-headers.conf;
        include /etc/nginx/snippets/upload-params.conf;
    }
}
